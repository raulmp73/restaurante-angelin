<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Restaurante Angelín">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#cf7d3c"/>
      <stop offset="55%" stop-color="#b96a35"/>
      <stop offset="100%" stop-color="#9c5825"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="1.6" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.50  0 0 0 0 0.30  0 0 0 0 0.15  0 0 0 0.18 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
  </defs>

  <!-- fondo terracota con grano -->
  <rect width="320" height="320" rx="18" fill="url(#bg)"/>
  <rect width="320" height="320" rx="18" filter="url(#grain)" opacity="0.75"/>

  <!-- símbolo: 3 trazos curvos blancos que se cruzan formando llamas/corona -->
  <g fill="none" stroke="#fefcf6" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
    <!-- llama izquierda: sube hasta arriba y baja al centro -->
    <path d="M 120 168
             C 116 142, 124 112, 138 88
             C 146 74, 152 70, 154 78
             C 156 92, 152 108, 148 120
             C 144 132, 142 148, 146 168 Z"/>
    <!-- llama central (más alta) -->
    <path d="M 144 174
             C 144 138, 156 100, 164 82
             C 168 74, 172 74, 176 82
             C 184 100, 196 138, 196 174 Z"/>
    <!-- llama derecha -->
    <path d="M 194 168
             C 198 148, 196 132, 192 120
             C 188 108, 184 92, 186 78
             C 188 70, 194 74, 202 88
             C 216 112, 224 142, 220 168 Z"/>
    <!-- base ovalada que une las llamas -->
    <ellipse cx="170" cy="172" rx="50" ry="9"/>
  </g>

  <!-- "Angelín" caligráfico amarillo -->
  <text x="160" y="252" text-anchor="middle"
        font-family="'Brush Script MT','Lucida Handwriting','Segoe Script',cursive"
        font-size="72" font-style="italic" font-weight="700"
        fill="#f0a83e" stroke="#d88a1f" stroke-width="0.6" paint-order="stroke">Angelín</text>

  <!-- BAR · RESTAURANTE -->
  <text x="160" y="282" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',sans-serif"
        font-size="13" font-weight="600" letter-spacing="6"
        fill="#fefcf6" opacity="0.95">BAR · RESTAURANTE</text>
</svg>
